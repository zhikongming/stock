<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用股票分析系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./common.css">
    <script src="./common.js"></script>
</head>
<body>
    <div class="page-container">
        <div class="header">
            <h1>
                <i class="fas fa-robot"></i>
                公司智能分析
            </h1>
            <p>输入公司名称，获取AI推荐的相似业务公司及量价关系分析</p>
        </div>

        <!-- 查询表单 -->
        <div class="form-container">
            <div class="form-header">
                <i class="fas fa-sliders-h"></i>
                <h2>分析设置</h2>
            </div>
            
            <form id="analysis-form">
                <div class="form-grid">
                    <!-- 公司名称 -->
                    <div class="form-group full-width">
                        <label class="form-label" for="company-name">
                            <i class="fas fa-building"></i>
                            <span>公司名称</span>
                        </label>
                        <input list="sector-options" type="text" id="company-name" class="form-control" placeholder="请输入公司名称" value="山大电力">
                        <datalist id="sector-options">
                            <!-- javascript来生成数据 -->
                        </datalist>
                    </div>
                    
                    <!-- AI功能选项 -->
                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fas fa-microchip"></i>
                            <span>AI分析选项</span>
                        </label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" id="similar-checkbox">
                                <span>展示相似业务公司的AI推荐</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="volume-price-checkbox">
                                <span>展示AI的量价关系分析</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: flex-end;">
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-search"></i>
                        <span>提交分析</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 结果区域（初始隐藏） -->
    <div id="results-section" class="results-container" style="display: none;">
        <!-- 公司基本信息卡片 -->
        <div class="info-card" id="basic-info-card">
            <div class="info-header">
                <i class="fas fa-info-circle"></i>
                <h3>公司基本信息</h3>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">股票代码</span>
                    <span class="info-value" id="stock-code"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">股票名称</span>
                    <span class="info-value" id="stock-name"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">所属板块代码</span>
                    <span class="info-value" id="sector-code"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">所属板块名称</span>
                    <span class="info-value" id="sector-name"></span>
                </div>
            </div>
        </div>
        
        <!-- 相似业务公司表格（动态显示/隐藏） -->
        <div class="table-container" id="similar-container">
            <div class="table-header">
                <h3 class="table-title">
                    <i class="fas fa-users"></i>
                    <span>相似业务公司推荐</span>
                </h3>
                <div class="table-info">共 <span id="similar-count">0</span> 家相似公司</div>
            </div>
            <table class="table-content-header" id="similar-table">
                <thead>
                    <tr>
                        <th>股票名称</th>
                        <th>相似度</th>
                        <th>相似原因</th>
                        <th>业务描述</th>
                    </tr>
                </thead>
                <tbody id="similar-tbody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
            <div id="similar-empty" class="empty-state" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>暂无相似公司推荐</h3>
            </div>
        </div>
        
        <!-- 量价关系分析卡片（动态显示/隐藏） -->
        <div class="table-container" id="volume-price-container">
            <div class="table-header">
                <h3 class="table-title">
                    <i class="fas fa-chart-line"></i>
                    <span>AI量价关系分析</span>
                </h3>
            </div>
            <div id="volume-price-content">
                <!-- 动态内容 -->
            </div>
            <div id="volume-price-empty" class="empty-state" style="display: none;">
                <i class="fas fa-chart-bar"></i>
                <h3>未选择量价分析</h3>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('analysis-form');
        const sectorOptions = document.getElementById("sector-options");
        const companyInput = document.getElementById("company-name");
        const similarCheck = document.getElementById('similar-checkbox');
        const volumeCheck = document.getElementById('volume-price-checkbox');
        const resultsSection = document.getElementById('results-section');
        const stockCode = document.getElementById('stock-code');
        const stockName = document.getElementById('stock-name');
        const sectorCode = document.getElementById('sector-code');
        const sectorName = document.getElementById('sector-name');
        const similarContainer = document.getElementById('similar-container');
        const similarTbody = document.getElementById('similar-tbody');
        const similarEmpty = document.getElementById('similar-empty');
        const similarCount = document.getElementById('similar-count');
        const volumeContainer = document.getElementById('volume-price-container');
        const volumeContent = document.getElementById('volume-price-content');
        const volumeEmpty = document.getElementById('volume-price-empty');

        let stockList = [];

        function generateStockData() {
            let resp = getCodeData();
            resp.then(data => {
                data.forEach(item => {
                    stockList.push(item);
                });
                generateStockOptions();
            });
        }

        function generateStockOptions() {
            stockList.forEach(item => {
                let option = document.createElement("option");
                option.value = item.company_name;
                sectorOptions.appendChild(option);
            });
        }

        // 绑定提交事件
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const companyName = companyInput.value.trim();
            if (!companyName) {
                alert('请输入公司名称');
                return;
            }
            const similarChecked = similarCheck.checked;
            const volumeChecked = volumeCheck.checked;
            
            let resp = getStockInfoData(companyName, similarChecked, volumeChecked);
            resp.then(data => {
                // 显示结果区域
                resultsSection.style.display = 'block';
                // 渲染股票信息
                renderStockInfo(data);
                // 渲染相似业务公司
                renderSimilarStocks(data);
                // 渲染量价关系分析
                renderVolumePriceAnalysis(data);
            });
        })

        function renderVolumePriceAnalysis(data) {
            const showVolume = volumeCheck.checked;
            if (showVolume && data.volume_price_info !== null) {
                volumeContainer.style.display = 'block';
                volumeEmpty.style.display = 'none';
                let analysis = data.volume_price_info;
                const safeClass = analysis.is_safe === '安全' ? 'safe' : 'unsafe';
                const safeText = analysis.is_safe;
                const icon = analysis.is_safe === '安全' ? 'fa-check-circle' : 'fa-exclamation-triangle';
                
                // 构建新内容
                volumeContent.innerHTML = `
                    <div class="date-range">
                        <i class="fas fa-calendar-alt"></i>
                        <span>分析周期：${analysis.start_date} 至 ${analysis.end_date}</span>
                    </div>
                    <div class="safety-badge ${safeClass}">
                        <i class="fas ${icon}"></i>
                        <span>${safeText}</span>
                    </div>
                    <div class="analysis-result">
                        ${analysis.analysis_result.replace(/。/g, '。<br>')}
                    </div>
                `;
            } else {
                volumeContainer.style.display = 'none';
                volumeEmpty.style.display = 'block';
            }
            
            // 聚焦到结果区域
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function renderSimilarStocks(data) {
            // 处理相似公司推荐
            const showSimilar = similarCheck.checked;
            if (showSimilar) {
                similarContainer.style.display = 'block';
                const similars = data.similar_companies_info || [];
                if (similars.length > 0) {
                    similarEmpty.style.display = 'none';
                    similarCount.textContent = similars.length;
                    similarTbody.innerHTML = '';
                    similars.forEach(s => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${s.company_name}</td>
                            <td><span class="table-colume-badge">${s.similarity_score}</span></td>
                            <td>${s.similarity_reason}</td>
                            <td class="business-desc">${s.business_description}</td>
                        `;
                        similarTbody.appendChild(tr);
                    });
                } else {
                    similarEmpty.style.display = 'block';
                    similarTbody.innerHTML = '';
                    similarCount.textContent = '0';
                }
            } else {
                similarContainer.style.display = 'none';
            }
        }

        function renderStockInfo(data) {
            // 渲染股票信息
            stockCode.innerHTML = `<a href="${getXueqiuStockUrl(data.code_info.code)}" target="_blank" class="no-underline">${data.code_info.code}</a>`;
            stockName.innerHTML = `<a href="${getXueqiuStockUrl(data.code_info.code)}" target="_blank" class="no-underline">${data.code_info.name}</a>`;
            sectorCode.innerHTML = `<a href="${getEastmoneyFullScreenChartUrl(data.industry_info.code, CODE_TYPE_INDUSTRY)}" target="_blank" class="no-underline">${data.industry_info.code}</a>`;
            sectorName.innerHTML = `<a href="${getEastmoneyFullScreenChartUrl(data.industry_info.code, CODE_TYPE_INDUSTRY)}" target="_blank" class="no-underline">${data.industry_info.name}</a>`;
        }

        generateStockData();
    </script>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎使用股票分析系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./common.css">
    <script src="./common.js"></script>
</head>
<body>
    <div class="page-container">
        <div class="header">
            <h1>
                <i class="fas fa-robot"></i>
                公司智能分析
            </h1>
            <p>输入公司名称，获取AI推荐的相似业务公司及量价关系分析</p>
        </div>

        <!-- 查询表单 -->
        <div class="form-container">
            <div class="form-header">
                <i class="fas fa-sliders-h"></i>
                <h2>分析设置</h2>
            </div>
            
            <form id="analysis-form">
                <div class="form-grid">
                    <!-- 公司名称 -->
                    <div class="form-group full-width">
                        <label class="form-label" for="company-name">
                            <i class="fas fa-building"></i>
                            <span>公司名称</span>
                        </label>
                        <input list="sector-options" type="text" id="company-name" class="form-control" placeholder="请输入公司名称" value="太阳纸业">
                        <datalist id="sector-options">
                            <!-- javascript来生成数据 -->
                        </datalist>
                    </div>
                    
                    <!-- AI功能选项 -->
                    <div class="form-group full-width">
                        <label class="form-label">
                            <i class="fas fa-microchip"></i>
                            <span>AI分析选项</span>
                        </label>
                        <div class="checkbox-group">
                            <label class="checkbox-item" style="margin-right: 10px;">
                                <input type="checkbox" id="business-analysis-checkbox">
                                <span>展示AI分析财报业务</span>
                            </label>
                            <label class="checkbox-item" style="margin-right: 10px;">
                                <input type="checkbox" id="similar-checkbox">
                                <span>展示相似业务公司的AI推荐</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="volume-price-checkbox">
                                <span>展示AI的量价关系分析</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="shareholder-checkbox">
                                <span>展示最新财报的股东分析</span>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div style="display: flex; justify-content: flex-end;">
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-search"></i>
                        <span>提交分析</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 结果区域（初始隐藏） -->
    <div id="results-section" class="results-container" style="display: none;">
        <!-- 公司基本信息卡片 -->
        <div class="info-card" id="basic-info-card">
            <div class="info-header">
                <i class="fas fa-info-circle"></i>
                <h3>公司基本信息</h3>
            </div>
            <div class="info-grid">
                <div class="info-item">
                    <span class="info-label">股票代码</span>
                    <span class="info-value" id="stock-code"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">股票名称</span>
                    <span class="info-value" id="stock-name"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">所属板块代码</span>
                    <span class="info-value" id="sector-code"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">所属板块名称</span>
                    <span class="info-value" id="sector-name"></span>
                </div>
            </div>
        </div>
        
        <!-- AI分析业务卡片（动态显示/隐藏） -->
        <div class="table-container" id="business-analysis-container">
            <div class="table-header">
                <h3 class="table-title">
                    <i class="fas fa-briefcase"></i>
                    <span>AI分析业务</span>
                </h3>
            </div>
            <div id="business-analysis-content">
                <!-- 动态内容 -->
            </div>
            <div id="business-analysis-empty" class="empty-state" style="display: none;">
                <i class="fas fa-briefcase"></i>
                <h3>未选择业务分析</h3>
            </div>
        </div>

        <!-- 相似业务公司表格（动态显示/隐藏） -->
        <div class="table-container" id="similar-container">
            <div class="table-header">
                <h3 class="table-title">
                    <i class="fas fa-users"></i>
                    <span>相似业务公司推荐</span>
                </h3>
                <div class="table-info">共 <span id="similar-count">0</span> 家相似公司</div>
            </div>
            <table class="table-content-header" id="similar-table">
                <thead>
                    <tr>
                        <th>股票名称</th>
                        <th>相似度</th>
                        <th>相似原因</th>
                        <th>业务描述</th>
                    </tr>
                </thead>
                <tbody id="similar-tbody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
            <div id="similar-empty" class="empty-state" style="display: none;">
                <i class="fas fa-search"></i>
                <h3>暂无相似公司推荐</h3>
            </div>
        </div>
        
        <!-- 量价关系分析卡片（动态显示/隐藏） -->
        <div class="table-container" id="volume-price-container">
            <div class="table-header">
                <h3 class="table-title">
                    <i class="fas fa-chart-line"></i>
                    <span>AI量价关系分析</span>
                </h3>
            </div>
            <div id="volume-price-content">
                <!-- 动态内容 -->
            </div>
            <div id="volume-price-empty" class="empty-state" style="display: none;">
                <i class="fas fa-chart-bar"></i>
                <h3>未选择量价分析</h3>
            </div>
        </div>

        <!-- 股东分析卡片（动态显示/隐藏） -->
        <div class="table-container" id="shareholder-container">
            <div class="table-header">
                <h3 class="table-title">
                    <i class="fas fa-users"></i>
                    <span>股东分析</span>
                </h3>
            </div>
            <div id="shareholder-content">
                <!-- 动态内容 -->
            </div>
            <div id="shareholder-empty" class="empty-state" style="display: none;">
                <i class="fas fa-users"></i>
                <h3>未选择股东分析</h3>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('analysis-form');
        const sectorOptions = document.getElementById("sector-options");
        const companyInput = document.getElementById("company-name");
        const similarCheck = document.getElementById('similar-checkbox');
        const volumeCheck = document.getElementById('volume-price-checkbox');
        const businessCheck = document.getElementById('business-analysis-checkbox');
        const shareholderCheck = document.getElementById('shareholder-checkbox');
        const resultsSection = document.getElementById('results-section');
        const stockCode = document.getElementById('stock-code');
        const stockName = document.getElementById('stock-name');
        const sectorCode = document.getElementById('sector-code');
        const sectorName = document.getElementById('sector-name');
        const similarContainer = document.getElementById('similar-container');
        const similarTbody = document.getElementById('similar-tbody');
        const similarEmpty = document.getElementById('similar-empty');
        const similarCount = document.getElementById('similar-count');
        const volumeContainer = document.getElementById('volume-price-container');
        const volumeContent = document.getElementById('volume-price-content');
        const volumeEmpty = document.getElementById('volume-price-empty');
        const businessContainer = document.getElementById('business-analysis-container');
        const businessContent = document.getElementById('business-analysis-content');
        const businessEmpty = document.getElementById('business-analysis-empty');
        const shareholderContainer = document.getElementById('shareholder-container');
        const shareholderContent = document.getElementById('shareholder-content');
        const shareholderEmpty = document.getElementById('shareholder-empty');

        let stockList = [];

        function generateStockData() {
            let resp = getCodeData();
            resp.then(data => {
                data.forEach(item => {
                    stockList.push(item);
                });
                generateStockOptions();
            });
        }

        function generateStockOptions() {
            stockList.forEach(item => {
                let option = document.createElement("option");
                option.value = item.company_name;
                sectorOptions.appendChild(option);
            });
        }

        // 绑定提交事件
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            queryStockInfoData();
        })

        function queryStockInfoData() {
            const companyName = companyInput.value.trim();
            if (!companyName) {
                alert('请输入公司名称');
                return;
            }
            const similarChecked = similarCheck.checked;
            const volumeChecked = volumeCheck.checked;
            const businessChecked = businessCheck.checked;
            const shareholderChecked = shareholderCheck.checked;
            
            let resp = getStockInfoData(companyName, similarChecked, volumeChecked, businessChecked, shareholderChecked);
            resp.then(data => {
                // 显示结果区域
                resultsSection.style.display = 'block';
                // 渲染股票信息
                renderStockInfo(data);
                // 渲染相似业务公司
                renderSimilarStocks(data);
                // 渲染量价关系分析
                renderVolumePriceAnalysis(data);
                // 渲染AI分析业务
                renderBusinessAnalysis(data);
                // 渲染股东分析
                renderShareholderAnalysis(data);
            });
        }

        function renderVolumePriceAnalysis(data) {
            const showVolume = volumeCheck.checked;
            if (showVolume && data.volume_price_info !== null) {
                volumeContainer.style.display = 'block';
                volumeEmpty.style.display = 'none';
                let analysis = data.volume_price_info;
                const safeClass = analysis.is_safe === '安全' ? 'safe' : 'unsafe';
                const safeText = analysis.is_safe;
                const icon = analysis.is_safe === '安全' ? 'fa-check-circle' : 'fa-exclamation-triangle';
                
                // 构建新内容
                volumeContent.innerHTML = `
                    <div class="date-range">
                        <i class="fas fa-calendar-alt"></i>
                        <span>分析周期：${analysis.start_date} 至 ${analysis.end_date}</span>
                    </div>
                    <div class="safety-badge ${safeClass}">
                        <i class="fas ${icon}"></i>
                        <span>${safeText}</span>
                    </div>
                    <div class="analysis-result">
                        ${analysis.analysis_result.replace(/。/g, '。<br>')}
                    </div>
                `;
            } else {
                volumeContainer.style.display = 'none';
                volumeEmpty.style.display = 'block';
            }
            
            // 聚焦到结果区域
            resultsSection.scrollIntoView({ behavior: 'smooth' });
        }

        function renderBusinessAnalysis(data) {
            const showBusiness = businessCheck.checked;
            if (showBusiness && data.business_analysis_info !== null) {
                businessContainer.style.display = 'block';
                businessEmpty.style.display = 'none';
                let analysis = data.business_analysis_info;
                let revenueAnalysis = analysis.revenue_analysis;

                // 构建新内容
                businessContent.innerHTML = `
                    <!-- 报告期信息 -->
                    <div class="date-range" style="margin-bottom: 20px;">
                        <i class="fas fa-calendar-alt" style="color: var(--secondary-color);"></i>
                        <span style="font-weight: 600; color: var(--dark-color);">报告期：${revenueAnalysis.reporting_period}</span>
                    </div>
                    
                    <!-- 分析摘要 -->
                    <div style="background-color: #f8fafc; border-radius: var(--border-radius); padding: 20px; margin-bottom: 25px; border-left: 4px solid var(--secondary-color);">
                        <h4 style="color: var(--dark-color); margin-bottom: 15px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-file-alt" style="color: var(--secondary-color);"></i>
                            分析摘要
                        </h4>
                        <div style="color: #334155; line-height: 1.8; font-size: 1rem;">
                            ${revenueAnalysis.summary.replace(/。/g, '。<br><br>')}
                        </div>
                    </div>
                    
                    <!-- 业务板块分析 -->
                    <div style="margin-bottom: 20px;">
                        <h4 style="color: var(--dark-color); margin-bottom: 20px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
                            <i class="fas fa-chart-pie" style="color: var(--secondary-color);"></i>
                            业务板块分析
                        </h4>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px;">
                            ${revenueAnalysis.business_segments.map((segment, index) => `
                                <div style="background-color: white; border-radius: var(--border-radius); padding: 20px; box-shadow: var(--shadow); border-top: 4px solid ${getSegmentColor(index)}; transition: all 0.3s ease;">
                                    <h5 style="color: var(--primary-color); margin-bottom: 15px; font-size: 1.1rem;">${segment.segment_name}</h5>
                                    <div style="margin-bottom: 10px;">
                                        <span style="color: #64748b; font-size: 0.9rem;">营收：</span>
                                        <span style="color: var(--dark-color); font-weight: 600;">${segment.revenue}</span>
                                    </div>
                                    <div style="margin-bottom: 15px;">
                                        <span style="color: #64748b; font-size: 0.9rem;">占比：</span>
                                        <span style="color: var(--dark-color); font-weight: 600;">${segment.percentage}</span>
                                    </div>
                                    <div style="color: #475569; font-size: 0.95rem; line-height: 1.6;">
                                        ${segment.description}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                businessContainer.style.display = 'none';
                businessEmpty.style.display = 'block';
            }
        }

        function renderShareholderAnalysis(data) {
            const shareholderChecked = shareholderCheck.checked;
            if (shareholderChecked) {
                shareholderContainer.style.display = 'block';
                shareholderEmpty.style.display = 'none';
                if (data && data.shareholder_analysis_info !== null) {
                    let shareholderAnalysis = data.shareholder_analysis_info;
                    // 计算股东数变化趋势
                    const diffClass = shareholderAnalysis.shareholder_number_diff >= 0 ? 'increase' : 'decrease';
                    const diffIcon = shareholderAnalysis.shareholder_number_diff >= 0 ? 'fa-arrow-up' : 'fa-arrow-down';
                    topShareholderHtml = `
                        <div style="margin-top: 20px;">
                            <h4 style="color: var(--dark-color); margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;">
                                <i class="fas fa-user-circle" style="color: var(--secondary-color);"></i>
                                前十大股东
                            </h4>
                            <table class="table-content-header" style="width: 100%;">
                                <thead>
                                    <tr>
                                        <th>股东名称</th>
                                        <th>持股数量</th>
                                        <th>持股比例(%)</th>
                                        <th>变化趋势</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${shareholderAnalysis.top_shareholder_list.map(item => `
                                        <tr>
                                            <td>${item.shareholder_name}</td>
                                            <td>${item.shareholder_number}</td>
                                            <td>${item.shareholder_per}</td>
                                            <td>${item.diff}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>

                        <div style="margin-top: 20px;">
                            <h4 style="color: var(--dark-color); margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;">
                                <i class="fas fa-user-circle" style="color: var(--secondary-color);"></i>
                                已退出前十大股东
                            </h4>
                            <table class="table-content-header" style="width: 100%;">
                                <thead>
                                    <tr>
                                        <th>股东名称</th>
                                        <th>上期持股数量</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${shareholderAnalysis.del_shareholder_list.map(item => `
                                        <tr>
                                            <td>${item.shareholder_name}</td>
                                            <td>${item.diff}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    `;
                    shareholderContent.innerHTML = `
                        <div class="date-range">
                            <i class="fas fa-calendar-alt"></i>
                            <span>最新财报股东数据(${shareholderAnalysis.report_date})</span>
                        </div>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin: 20px 0;">
                            <div style="background-color: #f8fafc; border-radius: var(--border-radius); padding: 20px; text-align: center;">
                                <div style="font-size: 2rem; font-weight: 700; color: var(--primary-color);">${shareholderAnalysis.shareholder_number}</div>
                                <div style="color: #64748b; font-size: 0.9rem; margin-top: 5px;">股东人数(户)</div>
                            </div>
                            <div style="background-color: #f8fafc; border-radius: var(--border-radius); padding: 20px; text-align: center;">
                                <div style="font-size: 2rem; font-weight: 700; color: ${shareholderAnalysis.shareholder_number_diff >= 0 ? '#ef4444' : '#22c55e'};">
                                    <i class="fas ${diffIcon}"></i> ${Math.abs(shareholderAnalysis.shareholder_number_diff)}
                                </div>
                                <div style="color: #64748b; font-size: 0.9rem; margin-top: 5px;">股东变化</div>
                            </div>
                        </div>
                        ${topShareholderHtml}
                    `;
                } else {
                    console.log(data.shareholder_analysis_info);
                    shareholderContent.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-users"></i>
                            <h3>暂无股东数据</h3>
                        </div>
                    `;
                }
            } else {
                shareholderContainer.style.display = 'none';
                shareholderEmpty.style.display = 'block';
            }
        }

        function renderSimilarStocks(data) {
            // 处理相似公司推荐
            const showSimilar = similarCheck.checked;
            if (showSimilar) {
                similarContainer.style.display = 'block';
                const similars = data.similar_companies_info || [];
                if (similars.length > 0) {
                    similarEmpty.style.display = 'none';
                    similarCount.textContent = similars.length;
                    similarTbody.innerHTML = '';
                    similars.forEach(s => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td><a href="https://xueqiu.com/S/${s.company_code}" target="_blank" class="no-underline">${s.company_name}</a></td>
                            <td><span class="table-colume-badge">${s.similarity_score}</span></td>
                            <td>${s.similarity_reason}</td>
                            <td class="business-desc">${s.business_description}</td>
                        `;
                        similarTbody.appendChild(tr);
                    });
                } else {
                    similarEmpty.style.display = 'block';
                    similarTbody.innerHTML = '';
                    similarCount.textContent = '0';
                }
            } else {
                similarContainer.style.display = 'none';
            }
        }

        function renderStockInfo(data) {
            // 渲染股票信息
            stockCode.innerHTML = `<a href="${getXueqiuStockUrl(data.code_info.code)}" target="_blank" class="no-underline">${data.code_info.code}</a>`;
            stockName.innerHTML = `<a href="${getXueqiuStockUrl(data.code_info.code)}" target="_blank" class="no-underline">${data.code_info.name}</a>`;
            sectorCode.innerHTML = `<a href="${getEastmoneyFullScreenChartUrl(data.industry_info.code, CODE_TYPE_INDUSTRY)}" target="_blank" class="no-underline">${data.industry_info.code}</a>`;
            sectorName.innerHTML = `<a href="${getEastmoneyFullScreenChartUrl(data.industry_info.code, CODE_TYPE_INDUSTRY)}" target="_blank" class="no-underline">${data.industry_info.name}</a>`;
        }

        function initParamEvents() {
            const paramsMap = getUrlParamsMap();
            let needSubmit = false;
            if (paramsMap.has('company_name')) {
                companyInput.value = paramsMap.get('company_name');
                needSubmit = true;
            }
            if (paramsMap.has('shareholder-checked')) {
                shareholderCheck.checked = paramsMap.get('shareholder-checked') === 'true';
                needSubmit = true;
            }
            if (needSubmit) {
                queryStockInfoData();
            }
        }

        generateStockData();
        initParamEvents();
    </script>
</body>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常用链接 - 股票分析系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./common.css">
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-link"></i> 常用链接</h1>
        <p>精选金融数据和市场分析资源，助您把握投资机会</p>
    </div>

    <div class="container">
        <!-- 内容区域 -->
        <div class="content">
            <h2>金融数据</h2>
            <div class="link-grid">
                <a href="https://finance.baidu.com/foreign/global-USDCNH" target="_blank" class="link-card">
                    <div class="link-icon blue">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <div class="link-info">
                        <h3>离岸汇率</h3>
                        <p>美元兑中国离岸人民币汇率查询</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                </a>

                <a href="https://cn.investing.com/rates-bonds/u.s.-10-year-bond-yield" target="_blank" class="link-card">
                    <div class="link-icon green">
                        <i class="fas fa-chart-bar"></i>
                    </div>
                    <div class="link-info">
                        <h3>美国十年期国债利率</h3>
                        <p>实时追踪美国国债收益率走势</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                </a>
            </div>

            <h2>股票市场</h2>
            <div class="link-grid">
                <a href="https://dapanyuntu.com" target="_blank" class="link-card">
                    <div class="link-icon blue">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="link-info">
                        <h3>大盘云图</h3>
                        <p>全面的股票行情和板块分析</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                </a>
            </div>

            <h2>材料价格</h2>
            <div class="link-grid">
                <a href="https://cn.investing.com/commodities/gold" target="_blank" class="link-card">
                    <div class="link-icon orange">
                        <i class="fas fa-coins"></i>
                    </div>
                    <div class="link-info">
                        <h3>黄金</h3>
                        <p>国际黄金现货价格期货行情</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                </a>

                <a href="https://cn.investing.com/commodities/copper" target="_blank" class="link-card">
                    <div class="link-icon blue">
                        <i class="fas fa-box"></i>
                    </div>
                    <div class="link-info">
                        <h3>铜</h3>
                        <p>国际铜现货价格期货行情</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                </a>

                <a href="https://cn.investing.com/commodities/brent-oil" target="_blank" class="link-card">
                    <div class="link-icon green">
                        <i class="fas fa-droplet"></i>
                    </div>
                    <div class="link-info">
                        <h3>布伦特原油</h3>
                        <p>伦敦布伦特原油期货价格实时行情</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                </a>

                <a href="https://pdata.100ppi.com/m/?f=basket&dir=mdi&ppid=975" target="_blank" class="link-card">
                    <div class="link-icon purple">
                        <i class="fas fa-flask-vial"></i>
                    </div>
                    <div class="link-info">
                        <h3>MDI</h3>
                        <p>化工材料价格指数</p>
                    </div>
                    <div class="link-arrow">
                        <i class="fas fa-external-link-alt"></i>
                    </div>
                </a>
            </div>
        </div>
    </div>
    
    <div class="footer">
        <p>股票分析系统 &copy; 2025 | 仅供学习参考</p>
    </div>
</body>
</html>

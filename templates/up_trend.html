<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上升趋势报告</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css">
    <link rel="stylesheet" href="./common.css">
    <script src="./common.js"></script>
    <style>
        /* 订阅股票行的醒目样式 */
        .subscribed-row {
            background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 50%, #fff7ed 100%) !important;
            border-left: 4px solid #f97316 !important;
            box-shadow: 0 2px 8px rgba(249, 115, 22, 0.15) !important;
            transform: scale(1.005);
            transition: all 0.3s ease;
        }

        .subscribed-row:hover {
            background: linear-gradient(135deg, #ffedd5 0%, #fed7aa 50%, #ffedd5 100%) !important;
            box-shadow: 0 4px 12px rgba(249, 115, 22, 0.25) !important;
            transform: scale(1.008);
        }

        /* 订阅股票的高亮图标 */
        .subscribed-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: linear-gradient(135deg, #f97316, #fb923c);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4);
            }
            50% {
                box-shadow: 0 0 0 6px rgba(249, 115, 22, 0);
            }
        }

        /* 订阅按钮激活状态 */
        .subscribe-btn.subscribed {
            background: linear-gradient(135deg, #f97316, #fb923c) !important;
            border-color: #f97316 !important;
            color: white !important;
        }

        .subscribe-btn.subscribed:hover {
            background: linear-gradient(135deg, #ea580c, #f97316) !important;
            transform: scale(1.05);
        }

        /* 股票名称高亮 */
        .subscribed-row .stock-highlight {
            font-weight: 700;
            color: #dc2626;
            text-shadow: 0 1px 2px rgba(220, 38, 38, 0.2);
        }

        /* 涨幅数字高亮 */
        .subscribed-row .highlight-rate {
            font-weight: 700;
            color: #16a34a;
            font-size: 1.1em;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="header">
            <h1>
                <i class="fas fa-arrow-up"></i>
                上升趋势分析报告
            </h1>
            <p>展示均线金叉后持续上涨的股票</p>
        </div>

        <!-- 板块统计 -->
        <div id="industry-stats" class="stats-container" style="display: none; margin-bottom: 10px;">
            <div class="stats-header">
                <h3>
                    <i class="fas fa-bar-chart"></i>
                    <span>板块分布</span>
                </h3>
            </div>
            <div id="industry-tags" class="tags-container"></div>
        </div>

        <!-- 结果表格 -->
        <div id="result-container" class="table-container">
            <div class="table-header">
                <h2 class="table-title">
                    <i class="fas fa-table"></i>
                    <span>上升趋势股票</span>
                </h2>
                <div class="table-info">共 <span id="result-count">0</span> 条记录
                    <button id="showAllCodeBtn" class="table-action-btn" style="margin-left: 20px;">
                        <i class="fas fa-eye"></i>
                        <span>点击遍历</span>
                    </button>
                </div>
            </div>
            <div class="table-header-actions">
                <button id="show-subscribed-btn" class="action-btn2 primary">
                    <i class="fas fa-eye"></i>
                    <span>只看订阅</span>
                </button>
                <button id="clear-subscriptions-btn" class="action-btn2 warning">
                    <i class="fas fa-trash-alt"></i>
                    <span>清除订阅</span>
                </button>
            </div>
            
            <table class="table-content-header">
                <thead>
                    <tr>
                        <th>股票代码</th>
                        <th>股票名称</th>
                        <th class="sortable" id="sort-industry">所属板块 <i class="fas fa-sort"></i></th>
                        <th>均线金叉日期</th>
                        <th>持续天数</th>
                        <th>最新价格</th>
                        <th>金叉之后涨幅</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="result-tbody">
                    <!-- 动态生成 -->
                </tbody>
            </table>
            
            <div id="empty-result" class="empty-state" style="display: none;">
                <i class="fas fa-database"></i>
                <h3>暂无数据</h3>
            </div>
        </div>
    </div>

    <script>
        // 存储key，与third_buy.html区分开
        const UP_TREND_STORAGE_KEY = 'up_trend_subscribed_stocks';

        // 获取DOM元素
        const resultContainer = document.getElementById('result-container');
        const resultTbody = document.getElementById('result-tbody');
        const resultCount = document.getElementById('result-count');
        const emptyResult = document.getElementById('empty-result');
        const showAllCodeBtn = document.getElementById('showAllCodeBtn');
        const showSubscribedBtn = document.getElementById('show-subscribed-btn');
        const clearSubscriptionsBtn = document.getElementById('clear-subscriptions-btn');

        let stockList = [];
        let openAllCodeListIndex = 0;
        let sortOrder = 'asc'; // 'asc' 或 'desc'
        let showSubscribedOnly = false; // 当前是否只显示订阅

        // 页面加载时自动获取数据
        document.addEventListener('DOMContentLoaded', async function() {
            let resp = await fetchUpTrendReport();
            renderTable(resp);
            
            // 绑定排序事件
            document.getElementById('sort-industry').addEventListener('click', function() {
                sortByIndustry();
            });
        });

        // 渲染板块统计
        function renderIndustryStats(data) {
            const industryTags = document.getElementById('industry-tags');
            const industryStats = document.getElementById('industry-stats');
            
            // 统计每个板块的个股数量
            const countMap = {};
            data.forEach(item => {
                const industry = item.industry_name || '未分类';
                countMap[industry] = (countMap[industry] || 0) + 1;
            });
            
            // 按数量降序排序
            const sortedIndustries = Object.entries(countMap).sort((a, b) => b[1] - a[1]);
            
            // 渲染标签
            industryTags.innerHTML = sortedIndustries.map(([industry, count]) => 
                `<span class="industry-tag table-colume-badge" style="margin-right: 10px;">${industry}</industry><span class="tag-count">(${count})</span></span>`
            ).join('');
            
            industryStats.style.display = 'block';
        }

        // 渲染表格
        function renderTable(data) {
            resultTbody.innerHTML = '';
            
            if (data && data.length > 0) {
                emptyResult.style.display = 'none';
                stockList = data;
                initShowAllCodeBtn();
                renderIndustryStats(data);
                
                // 过滤订阅股票
                let rows = data;
                if (showSubscribedOnly) {
                    const subscribed = getSubscribedStocks();
                    const subscribedCodes = new Set(subscribed.map(s => s.code));
                    rows = rows.filter(item => subscribedCodes.has(item.code));
                }
                
                resultCount.textContent = rows.length;
                
                if (rows.length === 0) {
                    emptyResult.style.display = 'block';
                    return;
                }
                
                rows.forEach(item => {
                    const subscribed = isSubscribed(item.code);
                    const tr = document.createElement('tr');
                    // 为订阅的股票行添加特殊样式类
                    if (subscribed) {
                        tr.className = 'subscribed-row';
                    }
                    tr.innerHTML = `
                        <td>
                            <a href="https://xueqiu.com/S/${item.code}" target="_blank" class="no-underline">${item.code}</a>
                            ${subscribed ? '<span class="subscribed-badge"><i class="fas fa-star"></i>已订阅</span>' : ''}
                        </td>
                        <td>
                            <a href="https://xueqiu.com/S/${item.code}" target="_blank" class="no-underline ${subscribed ? 'stock-highlight' : ''}">${item.name}</a>
                        </td>
                        <td>${item.industry_name}</td>
                        <td>${item.gold_cross_date}</td>
                        <td><span class="table-colume-badge increase">${item.duration_days}</span></td>
                        <td>${item.last_price}</td>
                        <td><span class="${subscribed ? 'highlight-rate' : ''}">${item.price_change_rate}%</span></td>
                        <td>
                            <button class="stock-action-btn subscribe-btn ${subscribed ? 'subscribed' : ''}" data-code="${item.code}" data-name="${item.name}">
                                <i class="fas ${subscribed ? 'fa-check-circle' : 'fa-bell'}"></i>
                                <span>${subscribed ? '已订阅' : '订阅'}</span>
                            </button>
                        </td>
                    `;
                    resultTbody.appendChild(tr);
                });
                
                initSubscribeButtons();
            } else {
                emptyResult.style.display = 'block';
                resultCount.textContent = '0';
                showAllCodeBtn.style.display = 'none';
                document.getElementById('industry-stats').style.display = 'none';
            }
        }

        // 初始化订阅按钮事件
        function initSubscribeButtons() {
            document.querySelectorAll('.subscribe-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const code = btn.dataset.code;
                    const name = btn.dataset.name;
                    const stock = { code, name };
                    toggleSubscribe(stock);
                });
            });
        }

        // 切换只看订阅模式
        function toggleShowSubscribed() {
            showSubscribedOnly = !showSubscribedOnly;
            const btn = document.getElementById('show-subscribed-btn');
            if (showSubscribedOnly) {
                btn.innerHTML = '<i class="fas fa-eye-slash"></i><span>显示全部</span>';
            } else {
                btn.innerHTML = '<i class="fas fa-eye"></i><span>只看订阅</span>';
            }
            renderTable(stockList);
        }

        // 清除所有订阅
        function clearAllSubscriptions() {
            if (confirm('确定清除所有订阅吗？')) {
                localStorage.removeItem(UP_TREND_STORAGE_KEY);
                showSubscribedOnly = false;
                document.getElementById('show-subscribed-btn').innerHTML = '<i class="fas fa-eye"></i><span>只看订阅</span>';
                renderTable(stockList);
            }
        }

        // 订阅/取消订阅
        function toggleSubscribe(stock) {
            let subscribed = getSubscribedStocks();
            const index = subscribed.findIndex(item => item.code === stock.code);
            if (index === -1) {
                subscribed.push({ code: stock.code, name: stock.name });
            } else {
                subscribed.splice(index, 1);
            }
            saveSubscribedStocks(subscribed);
            renderTable(stockList);
        }

        // 获取订阅列表
        function getSubscribedStocks() {
            const stored = localStorage.getItem(UP_TREND_STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        // 保存订阅列表
        function saveSubscribedStocks(subscribed) {
            localStorage.setItem(UP_TREND_STORAGE_KEY, JSON.stringify(subscribed));
        }

        // 检查某股票是否已订阅
        function isSubscribed(code) {
            const subscribed = getSubscribedStocks();
            return subscribed.some(item => item.code === code);
        }

        function initShowAllCodeBtn() {
            openAllCodeListIndex = 0;
            showAllCodeBtn.style.display = 'inline-block';
        }

        // 按所属板块排序
        function sortByIndustry() {
            // 切换排序顺序
            sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
            
            // 排序数据
            stockList.sort((a, b) => {
                const industryA = a.industry_name || '';
                const industryB = b.industry_name || '';
                if (sortOrder === 'asc') {
                    return industryA.localeCompare(industryB, 'zh-CN');
                } else {
                    return industryB.localeCompare(industryA, 'zh-CN');
                }
            });
            
            // 更新排序图标
            const sortIcon = document.querySelector('#sort-industry i');
            if (sortOrder === 'asc') {
                sortIcon.className = 'fas fa-sort-up';
            } else {
                sortIcon.className = 'fas fa-sort-down';
            }
            
            // 重新渲染表格
            renderTable(stockList);
        }

        function openAllCodeList() {
            for (let i = openAllCodeListIndex * MAX_OPEN_CODE_COUNT; i < stockList.length && i < (openAllCodeListIndex + 1) * MAX_OPEN_CODE_COUNT; i++) {
                let openUrl = "https://xueqiu.com/S/" + stockList[i].code;
                // 为了防止雪球请求太高, 会要求用户验证, 所以这里设置一个随机延迟
                const delay = Math.floor(Math.random() * 1000);
                setTimeout(() => {
                    window.open(openUrl, '_blank');
                }, delay);
            }
            openAllCodeListIndex++;
        }

        showAllCodeBtn.addEventListener('click', () => {
            openAllCodeList();
        });

        showSubscribedBtn.addEventListener('click', toggleShowSubscribed);
        clearSubscriptionsBtn.addEventListener('click', clearAllSubscriptions);
    </script>
</body>
</html>
